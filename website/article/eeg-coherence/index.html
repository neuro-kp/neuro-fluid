<!DOCTYPE html>
<html lang="en">
<head>
   <link rel="icon" href="/favicon.ico" type="image/x-icon">
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta http-equiv="X-UA-Compatible" content="ie=edge">
   <title>Fluid: EEG Coherence Analysis</title>
   <link href="/css/styles.css" rel="stylesheet" type="text/css">
   <link href="/css/view-styles.css" rel="stylesheet" type="text/css">
   <script src="https://kit.fontawesome.com/20cf8b42c0.js" crossorigin="anonymous"></script>
   <script src="/shared/util.js"></script>
</head>
<body class="standalone">
<div id="grid" class="grid-container data-pane-hidden double-size">
   <div></div>
   <div></div>
   <div class="flex-left-align">
      <h3>EEG Functional Connectivity</h3>
      <p>Bilateral Motor Cortex Coherence at Multiple Spatial Scales</p>
      <div style="font-size: 0.9em; color: #666; margin-top: 5px;">
         <span style="display: inline-block; margin-right: 15px;"><span style="color: blue;">●</span> Coherence</span>
         <span style="display: inline-block; margin-right: 15px;"><span style="color: lightblue;">●</span> wPLI</span>
         <span style="margin-left: 15px;">Click on any point to see sensor details</span>
      </div>
   </div>

   <div id="fig-data-pane" class="flex-right-align data-pane">
      <div id="fig-input" class="data-pane-column"></div>
   </div>
   <div onclick="toggleDataPane('grid')">
      <i class="data-pane-button toggle-button fa-solid fa-eye-slash"></i>
   </div>
   <div id="fig">
      <div class="fig-loading">loading figure(s)</div>
   </div>
</div>

<script type="module">
    import { loadFigure } from "/shared/load-figure.js"
    const spec = {
      "fluidSrcPath": ["../fluid"],
      "inputs": ["eeg_data"],
      "query": false,
      "linking": true
    }

    loadFigure(spec)("fig")("../fluid/eeg-coherence.fld")()
</script>
</body>
</html>
